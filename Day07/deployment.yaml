apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    tier: backend
  annotations:
    kubernetes.io/change-cause: "Pick up patch version"
spec:
  template:
    metadata:
      labels:
        app: v1
    spec:
      containers:
      - image: nginx:1.23.0
        name: nginx
  replicas: 3
  selector:
    matchLabels:
      app: v1