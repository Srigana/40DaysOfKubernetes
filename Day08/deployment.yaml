apiVersion: apps/v1
kind: Deployment
metadata: 
  name: myapp
spec:
  selector:
    matchLabels:
      app: myapp
  replicas: 1
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - image: nginx:1.23.4-alpine
        name: nginx-pod
        ports:
        - containerPort: 80
    